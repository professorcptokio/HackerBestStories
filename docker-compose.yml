services:
  redis:
    image: redis:7-alpine
    container_name: hacker_news_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: HackerBestStories.API/Dockerfile
    container_name: hacker_best_stories_api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - REDIS_CONNECTION=redis:6379
      - ExternalServices__HackerNewsBaseUrl=https://hacker-news.firebaseio.com/v0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stories?n=1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
